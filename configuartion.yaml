author: monointerferenz

templates_path: mono_tools/templates

drafts_path:
  posts: ~/Development/mono_tools/_drafts/_posts
  projects: ~/Development/mono_tools/_drafts/_projects
  music: ~/Development/mono_tools/_drafts/_projects/_music


releases_path:
  posts: ~/Development/mono_tools/_release/_posts
  projects: ~/Development/mono_tools/_release/_projects
  music: ~/Development/mono_tools/_release/_projects/_music

assets_path:
  posts: ~/Development/mono_tools/_release/_posts/assets
  projects: ~/Development/mono_tools/_release/_projects/assets
  music: ~/Development/mono_tools/_release/_projects/_music/assets

release:
  build_fields:
    - release
    - validate
    - draft_only
  frontmatter_image_fields:
    - image_preview
  category_fields:
    - categories
  preserve_string_fields:
    - title
    - short_description
  required_fields:
    common:
      - title
      - date
      - author
    project:
      - archive_record
      - short_description
    music: []
